name: ci-main

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: ZK artifact check
        run: npm run zk:check --workspace apps/zauth-core

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata for core
        id: meta_core
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zauth-core
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/zauth-core/Dockerfile
          push: true
          tags: ${{ steps.meta_core.outputs.tags }}
          labels: ${{ steps.meta_core.outputs.labels }}

      - name: Extract metadata for ui
        id: meta_ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zauth-ui
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/zauth-ui/Dockerfile
          push: true
          tags: ${{ steps.meta_ui.outputs.tags }}
          labels: ${{ steps.meta_ui.outputs.labels }}

      - name: Extract metadata for notes
        id: meta_notes
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zauth-notes
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push notes
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/zauth-notes/Dockerfile
          push: true
          tags: ${{ steps.meta_notes.outputs.tags }}
          labels: ${{ steps.meta_notes.outputs.labels }}

      - name: Trivy image scan core
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/zauth-core:latest
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
