name: deploy-prod

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy production env file
        run: |
          mkdir -p env
          printf "%s" "${{ secrets.PROD_ENV_FILE }}" > env/.env.prod

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git fetch --all
            git checkout ${{ github.sha }}
            printf "%s" "${{ secrets.PROD_ENV_FILE }}" > env/.env.prod
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export COMPOSE_PROJECT_NAME=zauth_prod
            docker compose -f docker/compose.base.yml -f docker/compose.prod.yml --env-file env/.env.prod pull
            docker compose -f docker/compose.base.yml -f docker/compose.prod.yml --env-file env/.env.prod up -d --remove-orphans
            ./scripts/smoke.sh
